version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mongodb:
    image: mongo:4.4
    container_name: mongodb
    command: ["mongod", "--replSet", "rs0"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./init-mongo/init.js:/docker-entrypoint-initdb.d/init.js
    restart: unless-stopped

  flask-producer:
    container_name: flask-producer
    build:
      context: ./agent1/producer
    ports:
      - "5000:5000"
    depends_on:
      - kafka
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    command: python server.py

  flask-consumer:
    container_name: flask-consumer
    build:
      context: ./agent1/consumer
    ports:
      - "5100:5100"
    depends_on:
      - kafka
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    command: python consumer.py

  agent2-consumer:
    container_name: agent2-consumer
    build:
      context: ./agent2/consumer
    depends_on:
      - kafka
      - mongodb
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MONGO_URI=mongodb://mongodb:27017/
    volumes:
      - ./agent2/consumer:/app
    working_dir: /app
    command: python kafka_to_mongodb.py

  agent2-compliance:
    build:
      context: ./agent2/compliance
    container_name: agent2-compliance
    command: python agent2_compliance.py
    depends_on:
      - kafka
      - mongodb
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MONGO_URI=mongodb://mongodb:27017/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./agent2/compliance:/app

volumes:
  mongo-data:

